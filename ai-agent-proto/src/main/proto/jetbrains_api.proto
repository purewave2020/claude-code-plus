syntax = "proto3";

package com.asakii.rpc.proto;

option java_package = "com.asakii.rpc.proto";
option java_multiple_files = true;
option java_outer_classname = "JetBrainsApiProto";

// ============================================================================
// JetBrains IDE Integration API
// 用于前端与IDEA插件的双向RSocket通信（替代JCEF）
// ============================================================================

// ========== 能力检测 ==========

message JetBrainsCapabilities {
  bool supported = 1;
  string version = 2;
}

// ========== 主题 ==========

message IdeThemeProto {
  string background = 1;
  string foreground = 2;
  string border_color = 3;
  string panel_background = 4;
  string text_field_background = 5;
  string selection_background = 6;
  string selection_foreground = 7;
  string link_color = 8;
  string error_color = 9;
  string warning_color = 10;
  string success_color = 11;
  string separator_color = 12;
  string hover_background = 13;
  string accent_color = 14;
  string info_background = 15;
  string code_background = 16;
  string secondary_foreground = 17;
  string font_family = 18;
  int32 font_size = 19;
  string editor_font_family = 20;
  int32 editor_font_size = 21;
}

// ========== 打开文件 ==========

message JetBrainsOpenFileRequest {
  string file_path = 1;
  optional int32 line = 2;
  optional int32 column = 3;
  optional int32 start_offset = 4;
  optional int32 end_offset = 5;
}

// ========== 显示Diff ==========

message JetBrainsShowDiffRequest {
  string file_path = 1;
  string old_content = 2;
  string new_content = 3;
  optional string title = 4;
}

// ========== 多编辑Diff ==========

message JetBrainsEditOperation {
  string old_string = 1;
  string new_string = 2;
  bool replace_all = 3;
}

message JetBrainsShowMultiEditDiffRequest {
  string file_path = 1;
  repeated JetBrainsEditOperation edits = 2;
  optional string current_content = 3;
}

// ========== 编辑预览Diff（权限请求时使用）==========

message JetBrainsShowEditPreviewRequest {
  string file_path = 1;
  repeated JetBrainsEditOperation edits = 2;
  optional string title = 3;
}

// ========== 显示Markdown（计划预览）==========

message JetBrainsShowMarkdownRequest {
  string content = 1;
  optional string title = 2;
}

// ========== 完整文件Diff（修改前后对比）==========

message JetBrainsShowEditFullDiffRequest {
  string file_path = 1;
  string old_string = 2;
  string new_string = 3;
  bool replace_all = 4;
  optional string title = 5;
  optional string original_content = 6;  // 缓存的原始文件内容（如果有）
}

// ========== 会话状态（前端→后端）==========

message JetBrainsSessionSummary {
  string id = 1;                      // Tab ID
  string title = 2;
  optional string session_id = 3;     // 真实会话ID（连接后才有）
  bool is_generating = 4;
  bool is_connected = 5;
  bool is_connecting = 6;
}

message JetBrainsSessionState {
  repeated JetBrainsSessionSummary sessions = 1;
  optional string active_session_id = 2;
}

// ========== 会话命令（后端→前端）==========

enum JetBrainsSessionCommandType {
  SESSION_COMMAND_UNSPECIFIED = 0;
  SESSION_COMMAND_SWITCH = 1;         // switchSession
  SESSION_COMMAND_CREATE = 2;         // createSession
  SESSION_COMMAND_CLOSE = 3;          // closeSession
  SESSION_COMMAND_RENAME = 4;         // renameSession
  SESSION_COMMAND_TOGGLE_HISTORY = 5; // toggleHistory
  SESSION_COMMAND_SET_LOCALE = 6;     // setLocale
  SESSION_COMMAND_DELETE = 7;         // deleteSession（删除历史会话）
  SESSION_COMMAND_RESET = 8;          // resetSession（重置/清空当前会话）
}

message JetBrainsSessionCommand {
  JetBrainsSessionCommandType type = 1;
  optional string session_id = 2;
  optional string new_name = 3;
  optional string locale = 4;
}

// ========== 通用响应 ==========

message JetBrainsOperationResponse {
  bool success = 1;
  optional string error = 2;
}

// ========== 获取主题 ==========

message JetBrainsGetThemeRequest {}

message JetBrainsGetThemeResponse {
  IdeThemeProto theme = 1;
}

// ========== 获取项目路径 ==========

message JetBrainsGetProjectPathRequest {}

message JetBrainsGetProjectPathResponse {
  string project_path = 1;
}

// ========== 获取/设置语言 ==========

message JetBrainsGetLocaleRequest {}

message JetBrainsGetLocaleResponse {
  string locale = 1;
}

message JetBrainsSetLocaleRequest {
  string locale = 1;
}

// ========== 获取原始文件内容（LocalHistory Label）==========

message JetBrainsGetOriginalContentRequest {
  string tool_use_id = 1;
}

message JetBrainsGetOriginalContentResponse {
  bool success = 1;
  bool found = 2;                     // 是否找到缓存
  optional string content = 3;        // 原始文件内容
  optional string error = 4;
}

// ========== 获取文件历史内容（基于时间戳查询 LocalHistory）==========

message JetBrainsGetFileHistoryContentRequest {
  string file_path = 1;              // 文件绝对路径
  int64 before_timestamp = 2;        // 时间戳（毫秒），获取此时间之前的版本
}

message JetBrainsGetFileHistoryContentResponse {
  bool success = 1;
  bool found = 2;                     // 是否找到历史版本
  optional string content = 3;        // 历史文件内容
  optional string error = 4;
}

// ========== 文件回滚（恢复到指定时间戳之前的版本）==========

message JetBrainsRollbackFileRequest {
  string file_path = 1;              // 文件绝对路径
  int64 before_timestamp = 2;        // 时间戳（毫秒），回滚到此时间之前的版本
}

message JetBrainsRollbackFileResponse {
  bool success = 1;
  optional string error = 2;
}

// ========== 批量回滚（流式返回结果）==========

// 单个回滚项
message JetBrainsBatchRollbackItem {
  string file_path = 1;              // 文件路径
  int64 before_timestamp = 2;        // 时间戳（0 表示删除新建文件）
  string tool_use_id = 3;            // 工具调用 ID（用于前端匹配）
}

// 批量回滚请求
message JetBrainsBatchRollbackRequest {
  repeated JetBrainsBatchRollbackItem items = 1;
}

// 回滚状态枚举
enum RollbackStatus {
  ROLLBACK_STARTED = 0;              // 开始回滚
  ROLLBACK_SUCCESS = 1;              // 回滚成功
  ROLLBACK_FAILED = 2;               // 回滚失败
}

// 批量回滚流式事件
message JetBrainsBatchRollbackEvent {
  string file_path = 1;              // 文件路径
  string tool_use_id = 2;            // 工具调用 ID
  RollbackStatus status = 3;         // 回滚状态
  optional string error = 4;         // 错误信息（失败时）
}

// ========== Terminal 后台执行 ==========

// 单个终端后台项
message JetBrainsTerminalBackgroundItem {
  string session_id = 1;             // 终端会话 ID
  string tool_use_id = 2;            // MCP 工具调用 ID
}

// 终端后台请求（单个或批量）
message JetBrainsTerminalBackgroundRequest {
  repeated JetBrainsTerminalBackgroundItem items = 1;  // 要后台的终端任务
}

// 终端后台状态枚举
enum TerminalBackgroundStatus {
  TERMINAL_BG_STARTED = 0;           // 开始后台化
  TERMINAL_BG_SUCCESS = 1;           // 后台化成功
  TERMINAL_BG_FAILED = 2;            // 后台化失败
}

// 终端后台流式事件
message JetBrainsTerminalBackgroundEvent {
  string session_id = 1;             // 终端会话 ID
  string tool_use_id = 2;            // MCP 工具调用 ID
  TerminalBackgroundStatus status = 3;  // 后台化状态
  optional string error = 4;         // 错误信息（失败时）
}

// ========== 获取可后台的终端任务 ==========

message JetBrainsGetBackgroundableTerminalsRequest {
  optional string ai_session_id = 1; // AI 会话 ID，为空则使用当前会话
}

// 可后台的终端任务信息
message JetBrainsBackgroundableTerminal {
  string session_id = 1;             // 终端会话 ID
  string tool_use_id = 2;            // MCP 工具调用 ID
  string command = 3;                // 正在执行的命令
  int64 start_time = 4;              // 开始时间戳（毫秒）
  int64 elapsed_ms = 5;              // 已执行时长（毫秒）
}

message JetBrainsGetBackgroundableTerminalsResponse {
  bool success = 1;
  repeated JetBrainsBackgroundableTerminal terminals = 2;
  optional string error = 3;
}
